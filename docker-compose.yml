services:
    nginx:
        image: nginx:alpine
        container_name: proxy_nginx
        restart: always
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ./nginx/conf.d:/etc/nginx/conf.d:ro
            - ./nginx/ssl:/etc/nginx/certs:ro
        networks:
            - proxy_network

networks:
    proxy_network:
        name: proxy_network
